apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: grade-submission-api
  namespace: kusto
  labels:
    app: devgrade-submission-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: grade-submission-api

  template:
    metadata:
      labels:
        app: grade-submission-api

    spec:
      containers:
        - name: grade-submission-api
          image: nginx:latest
          ports:
            - containerPort: 80

  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause:
            duration: 30s

        - setWeight: 50
        - pause:
            duration: 60s

        - setWeight: 100
